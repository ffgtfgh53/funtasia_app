<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.materialicons.com/2.0/css/material-symbols-outlined.css" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary": "#CBA6F7", // Mauve
                    "on-primary": "#1E1E2E",
                    "primary-container": "#45475A",
                    "on-primary-container": "#CBA6F7",
                    "secondary": "#B4BEFE",
                    "on-secondary": "#1E1E2E",
                    "secondary-container": "#313244",
                    "on-secondary-container": "#B4BEFE",
                    "tertiary": "#F5C2E7",
                    "on-tertiary": "#1E1E2E",
                    "tertiary-container": "#313244",
                    "on-tertiary-container": "#F5C2E7",
                    "error": "#F38BA8",
                    "on-error": "#1E1E2E",
                    "error-container": "#45475A",
                    "on-error-container": "#F38BA8",
                    "background": "#11111B", // Deep Nocturnal
                    "on-background": "#CDD6F4",
                    "surface": "#1E1E2E",
                    "on-surface": "#CDD6F4",
                    "surface-variant": "#313244",
                    "on-surface-variant": "#BAC2DE",
                    "outline": "#585B70",
                    "outline-variant": "#45475A",
                    "surface-container-low": "#181825",
                    "surface-container": "#1E1E2E",
                    "surface-container-high": "#313244",
                    "surface-container-highest": "#45475A"
            },
            "borderRadius": {
                    "DEFAULT": "0.5rem",
                    "lg": "0.5rem",
                    "xl": "1rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Space Grotesk"],
                    "body": ["Space Grotesk"],
                    "label": ["Space Grotesk"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body {
            min-height: max(884px, 100dvh);
            background-color: #11111B;
        }
        .code-input:focus {
            outline: none;
            border-color: #CBA6F7;
            box-shadow: 0 0 0 2px rgba(203, 166, 247, 0.2);
        }
        .editorial-text {
            letter-spacing: -0.02em;
        }
    </style>
</head>
<body class="bg-background font-body text-on-background antialiased">
<!-- Main Content Background -->
<main class="relative min-h-screen w-full flex flex-col overflow-hidden">
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover opacity-20 grayscale brightness-[0.2]" data-alt="abstract top-down view of a modern city map with blue and teal architectural lines" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDAd_4oZY0SxCnPvIhs_pBEHzZJZm1_JzfegJcpeEIFS5yYg2Rb5FoI-v8c5Uxwuk9-ej5tM7iVOpwyQrwuUrQLpTc9jdyyKDJqDg6aLUspffLnihQZV7kpls0p3y0lmULBfsk-_LH13ZAqulM9hI3P-sl0ygI9obXAgVZuAPVCqhTA_mR0ZMGL_LldilI5UGjjLcAn8KkKxNhzjoq3KPuGpwu9TXCAXPbOKagHGBSdvag5wJlHQmb21LDNGXyvGKZgmC6FCeP8xrQ"/>
</div>
<!-- Top Navigation -->
<header class="fixed top-0 left-0 w-full z-50 px-4 h-16 flex items-center justify-between bg-background/80 backdrop-blur-2xl border-b border-outline-variant/20">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface" data-icon="close">close</span>
<h1 class="font-headline font-bold tracking-tight text-on-surface text-lg editorial-text">Scan Location QR</h1>
</div>
<div class="w-10 h-10 rounded-lg bg-surface-container-high flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="more_vert">more_vert</span>
</div>
</header>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-[60] bg-black/70 backdrop-blur-md flex items-center justify-center p-6">
<!-- Text Input Modal Container -->
<div class="relative w-full max-w-sm bg-surface rounded-xl shadow-[0_0_50px_rgba(0,0,0,0.5)] border border-outline-variant/30 overflow-hidden flex flex-col">
<!-- Close Button -->
<button class="absolute top-4 right-4 z-10 p-2 rounded-lg hover:bg-surface-container-high transition-colors text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<!-- Header Info -->
<div class="pt-10 pb-6 px-8 text-center">
<h2 class="font-headline text-2xl font-bold text-on-surface editorial-text">Scan Location QR</h2>
<p class="font-body text-sm text-on-surface-variant mt-2">Enter the location code manually</p>
</div>
<!-- Manual Input Area -->
<div class="px-8 pb-8 flex flex-col items-center">
<div class="flex gap-2 mb-8">
<input class="code-input w-12 h-14 bg-surface-container-high border border-outline text-center text-2xl font-bold rounded-lg text-primary" maxlength="1" type="text" value="5"/>
<input class="code-input w-12 h-14 bg-surface-container-high border border-outline text-center text-2xl font-bold rounded-lg text-primary" maxlength="1" type="text" value="2"/>
<input class="code-input w-12 h-14 bg-surface-container-high border border-outline text-center text-2xl font-bold rounded-lg text-on-surface-variant" maxlength="1" placeholder="-" type="text"/>
<input class="code-input w-12 h-14 bg-surface-container-high border border-outline text-center text-2xl font-bold rounded-lg text-on-surface-variant" maxlength="1" placeholder="-" type="text"/>
<input class="code-input w-12 h-14 bg-surface-container-high border border-outline text-center text-2xl font-bold rounded-lg text-on-surface-variant" maxlength="1" placeholder="-" type="text"/>
<input class="code-input w-12 h-14 bg-surface-container-high border border-outline text-center text-2xl font-bold rounded-lg text-on-surface-variant" maxlength="1" placeholder="-" type="text"/>
</div>
<!-- Toggle Buttons -->
<div class="flex w-full bg-surface-container-low p-1.5 rounded-lg mb-6 border border-outline-variant/30">
<button class="flex-1 py-2 rounded-lg text-xs font-label font-bold flex items-center justify-center gap-2 text-on-surface-variant hover:text-on-surface transition-all">
<span class="material-symbols-outlined text-[16px]" data-icon="qr_code_scanner">qr_code_scanner</span>
                            QR Code
                        </button>
<button class="flex-1 py-2 rounded-lg text-xs font-label font-bold flex items-center justify-center gap-2 bg-primary text-on-primary shadow-lg shadow-primary/20 transition-all">
<span class="material-symbols-outlined text-[16px]" data-icon="keyboard">keyboard</span>
                            Text Input
                        </button>
</div>
<!-- Submit Button -->
<button class="w-full bg-surface-container-highest border border-primary/30 text-primary h-14 rounded-lg font-label font-bold flex items-center justify-center gap-2 shadow-xl hover:bg-primary hover:text-on-primary active:scale-[0.98] transition-all duration-300">
                        Continue
                        <span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</div>
</div>
<!-- Background Content Placeholder -->
<section class="mt-20 px-6 space-y-8">
<div class="space-y-3">
<span class="text-primary font-label font-bold uppercase tracking-[0.2em] text-[10px]">District Guide</span>
<h2 class="font-headline text-4xl font-bold text-on-surface leading-[1.1] editorial-text">Navigating<br/>the District</h2>
</div>
<div class="grid grid-cols-1 gap-4">
<div class="p-6 bg-surface-container border border-outline-variant/20 rounded-lg">
<div class="w-12 h-12 bg-primary-container rounded-lg flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-primary" data-icon="map">map</span>
</div>
<h3 class="font-headline font-bold text-on-surface text-lg editorial-text">Precision Map</h3>
<p class="text-sm text-on-surface-variant mt-2 leading-relaxed">High-fidelity spatial data for explorers.</p>
</div>
</div>
</section>
<!-- Bottom Navigation -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-6 pb-8 pt-4 bg-background/90 backdrop-blur-2xl border-t border-outline-variant/20 rounded-t-2xl">
<div class="flex flex-col items-center justify-center text-on-surface-variant p-2 opacity-60">
<span class="material-symbols-outlined" data-icon="explore">explore</span>
<span class="font-label text-[10px] font-bold mt-1.5 uppercase tracking-wider">Explore</span>
</div>
<div class="flex flex-col items-center justify-center bg-primary text-on-primary rounded-lg p-3.5 -mt-8 shadow-[0_8px_24px_rgba(203,166,247,0.3)] border-4 border-background">
<span class="material-symbols-outlined" data-icon="qr_code_scanner" style="font-variation-settings: 'FILL' 1;">qr_code_scanner</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant p-2 opacity-60">
<span class="material-symbols-outlined" data-icon="bookmark">bookmark</span>
<span class="font-label text-[10px] font-bold mt-1.5 uppercase tracking-wider">Saved</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant p-2 opacity-60">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label text-[10px] font-bold mt-1.5 uppercase tracking-wider">Profile</span>
</div>
</nav>
</main>
</body></html>
