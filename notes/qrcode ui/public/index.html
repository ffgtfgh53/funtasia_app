<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Torch / QR Scanner Test</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #2a2a3a;
      --accent: #00e5ff;
      --accent-dim: rgba(0, 229, 255, 0.12);
      --warn: #ff6b35;
      --green: #00ff88;
      --text: #e8e8f0;
      --muted: #6b6b80;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 24px 16px 40px;
      gap: 20px;
    }

    /* subtle grid bg */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    header {
      text-align: center;
      z-index: 1;
    }

    header h1 {
      font-size: clamp(1.4rem, 5vw, 2rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--accent);
    }

    header p {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 0.05em;
    }

    /* Video container */
    .camera-wrap {
      position: relative;
      width: 100%;
      max-width: 420px;
      aspect-ratio: 1;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #000;
      z-index: 1;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* QR corner guides */
    .camera-wrap::before,
    .camera-wrap::after,
    .corner-br,
    .corner-tl {
      content: '';
      position: absolute;
      width: 36px;
      height: 36px;
      border-color: var(--accent);
      border-style: solid;
      opacity: 0.9;
      z-index: 10;
    }

    .camera-wrap::before { top: 20px; left: 20px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    .camera-wrap::after  { top: 20px; right: 20px; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
    .corner-br { bottom: 20px; right: 20px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
    .corner-tl { bottom: 20px; left: 20px; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }

    /* Scan line */
    .scan-line {
      display: none;
      position: absolute;
      left: 20px; right: 20px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      top: 20px;
      z-index: 9;
      animation: scanMove 2.5s ease-in-out infinite;
      box-shadow: 0 0 12px var(--accent);
    }

    @keyframes scanMove {
      0%, 100% { top: 20px; opacity: 0.6; }
      50% { top: calc(100% - 20px); opacity: 1; }
    }

    /* Camera placeholder */
    .cam-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
    }

    .cam-placeholder svg { opacity: 0.3; }
    .cam-placeholder span {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      text-align: center;
    }

    /* Controls panel */
    .panel {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      z-index: 1;
    }

    .panel-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .btn-row {
      display: flex;
      gap: 10px;
    }

    button {
      flex: 1;
      padding: 13px 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }

    button:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }

    button.primary:hover:not(:disabled) {
      background: #33ecff;
      color: #000;
    }

    button.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    button.danger {
      border-color: var(--warn);
      color: var(--warn);
    }

    button.danger:hover:not(:disabled) {
      background: rgba(255,107,53,0.12);
    }

    /* Status badge */
    .status-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .status-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
    }

    .status-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .status-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }

    .dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot.red   { background: var(--warn); }
    .dot.grey  { background: var(--muted); }

    /* Log */
    .log {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      color: var(--muted);
      max-height: 130px;
      overflow-y: auto;
      line-height: 1.8;
    }

    .log .entry { color: var(--text); }
    .log .entry.ok { color: var(--green); }
    .log .entry.err { color: var(--warn); }
    .log .entry.info { color: var(--accent); }

    /* iOS note */
    .ios-note {
      display: none;
      width: 100%;
      max-width: 420px;
      background: rgba(255,107,53,0.08);
      border: 1px solid rgba(255,107,53,0.3);
      border-radius: 12px;
      padding: 14px 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--warn);
      line-height: 1.7;
      z-index: 1;
    }

    .ios-note strong { display: block; margin-bottom: 4px; font-size: 0.75rem; }
  </style>
</head>
<body>

  <header>
    <h1>⚡ Torch Test</h1>
    <p>CAMERA + FLASHLIGHT API TESTER</p>
  </header>

  <!-- Camera -->
  <div class="camera-wrap" id="cameraWrap">
    <video id="video" autoplay playsinline muted></video>
    <div class="scan-line" id="scanLine"></div>
    <div class="corner-br"></div>
    <div class="corner-tl"></div>
    <div class="cam-placeholder" id="placeholder">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      <span>Press START CAMERA<br/>to begin</span>
    </div>
  </div>

  <!-- Controls -->
  <div class="panel">
    <div class="panel-title">Camera Controls</div>
    <div class="btn-row">
      <button class="primary" id="btnStart" onclick="startCamera()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Start Camera
      </button>
      <button id="btnStop" onclick="stopCamera()" disabled>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
        Stop
      </button>
    </div>

    <div class="panel-title">Torch</div>
    <div class="btn-row">
      <button id="btnTorch" onclick="toggleTorch()" disabled>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M9 3l-6 6 6 6 3-3M15 21l6-6-6-6-3 3"/>
        </svg>
        Toggle Torch
      </button>
    </div>

    <div class="panel-title">Status</div>
    <div class="status-grid">
      <div class="status-item">
        <div class="status-label">Camera</div>
        <div class="status-val" id="statusCamera"><span class="dot grey"></span>Off</div>
      </div>
      <div class="status-item">
        <div class="status-label">Torch Support</div>
        <div class="status-val" id="statusTorchSupport"><span class="dot grey"></span>Unknown</div>
      </div>
      <div class="status-item">
        <div class="status-label">Torch State</div>
        <div class="status-val" id="statusTorch"><span class="dot grey"></span>Off</div>
      </div>
      <div class="status-item">
        <div class="status-label">Facing Mode</div>
        <div class="status-val" id="statusFacing">—</div>
      </div>
    </div>

    <div class="panel-title">Log</div>
    <div class="log" id="log">
      <div class="entry info">// Ready. Press Start Camera.</div>
    </div>
  </div>

  <script>
    let stream = null;
    let videoTrack = null;
    let torchOn = false;
    let torchSupported = false;

    const video = document.getElementById('video');
    const placeholder = document.getElementById('placeholder');
    const scanLine = document.getElementById('scanLine');

    // ── Logging ──────────────────────────────────────────────
    function log(msg, type = '') {
      const el = document.getElementById('log');
      const div = document.createElement('div');
      div.className = 'entry ' + type;
      div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      el.appendChild(div);
      el.scrollTop = el.scrollHeight;
    }

    function setStatus(id, dotClass, text) {
      document.getElementById(id).innerHTML = `<span class="dot ${dotClass}"></span>${text}`;
    }

    // ── Platform detection (log only, never block) ────────────
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
    const isHTTPS = location.protocol === 'https:' || location.hostname === 'localhost';

    // Full diagnostics to JS console — always, every platform
    console.group('[TorchTest] Boot diagnostics');
    console.log('User Agent     :', navigator.userAgent);
    console.log('Platform       :', navigator.platform);
    console.log('Vendor         :', navigator.vendor);
    console.log('isIOS (UA)     :', isIOS);
    console.log('isSafari       :', isSafari);
    console.log('HTTPS/localhost:', isHTTPS);
    console.log('mediaDevices   :', !!navigator.mediaDevices);
    console.log('getUserMedia   :', !!(navigator.mediaDevices?.getUserMedia));
    console.log('maxTouchPoints :', navigator.maxTouchPoints);
    console.log('Languages      :', navigator.languages?.join(', '));
    console.groupEnd();

    // Mirror into on-screen log
    log(`UA: ${navigator.userAgent.substring(0, 90)}`, 'info');
    log(`Platform: ${navigator.platform} | iOS: ${isIOS} | Safari: ${isSafari} | HTTPS: ${isHTTPS}`, 'info');
    log(`mediaDevices: ${!!navigator.mediaDevices} | getUserMedia: ${!!(navigator.mediaDevices?.getUserMedia)}`, 'info');

    // Advisory only — no banner, no blocking, no disabling buttons
    if (isIOS || isSafari) {
      log('iOS/Safari detected — torch may not be available, but will still attempt and log result', 'info');
      console.warn('[TorchTest] iOS/Safari: WebKit does not implement torch constraint. Attempting anyway to capture actual error.');
    }

    // ── Helpers ───────────────────────────────────────────────
    function waitForPlaying(videoEl) {
      return new Promise(resolve => {
        if (!videoEl.paused && videoEl.readyState >= 3) return resolve();
        videoEl.addEventListener('playing', resolve, { once: true });
      });
    }

    function delay(ms) {
      return new Promise(r => setTimeout(r, ms));
    }

    // ── Enumerate cameras ─────────────────────────────────────
    async function getCameraDevices() {
      const devices = await navigator.mediaDevices.enumerateDevices();
      return devices.filter(d => d.kind === 'videoinput');
    }

    // ── Try one specific camera deviceId, return {stream, track} or null ─
    async function tryCamera(deviceId, label) {
      log(`  Trying: "${label || deviceId}"…`, 'info');
      let s;
      try {
        s = await navigator.mediaDevices.getUserMedia({
          video: {
            deviceId: { exact: deviceId },
            width:  { ideal: 1920 },
            height: { ideal: 1080 },
          }
        });
      } catch (e) {
        log(`  ✗ getUserMedia failed: ${e.name}`, 'err');
        return null;
      }

      const track = s.getVideoTracks()[0];

      // Set it on video so it starts playing → capabilities populate
      video.srcObject = s;
      await waitForPlaying(video);
      await delay(400);

      const caps = track.getCapabilities?.() ?? {};
      const settingsFacing = track.getSettings().facingMode;

      log(`  caps.torch=${caps.torch} facing=${settingsFacing} label="${track.label}"`, 'info');
      console.log('[TorchTest] tryCamera caps:', caps, '| facing:', settingsFacing, '| label:', track.label);

      // Method 1: getCapabilities advertises torch
      if (caps.torch === true) {
        log(`  ✅ torch in capabilities!`, 'ok');
        return { stream: s, track };
      }

      // Method 2: constraint probe
      try {
        await track.applyConstraints({ advanced: [{ torch: false }] });
        log(`  ✅ torch confirmed via probe!`, 'ok');
        return { stream: s, track };
      } catch (e) {
        log(`  ✗ probe failed: ${e.name}: ${e.message}`, 'err');
      }

      // This camera doesn't support torch — stop it and try next
      track.stop();
      s.getTracks().forEach(t => t.stop());
      return null;
    }

    // ── Start camera (enumerate + find torch-capable track) ───
    async function startCamera() {
      try {
        document.getElementById('btnStart').disabled = true;
        log('── Requesting initial permission…', 'info');

        // First call just to get permission (labels are hidden until granted)
        const permStream = await navigator.mediaDevices.getUserMedia({ video: true });
        permStream.getTracks().forEach(t => t.stop());

        const cameras = await getCameraDevices();
        log(`Found ${cameras.length} camera(s):`, 'info');
        cameras.forEach((c, i) => log(`  [${i}] "${c.label}"`, 'info'));
        log(`UA: ${navigator.userAgent.substring(0, 90)}`, 'info');

        // Sort: prefer cameras whose label contains "0" or "back" or "rear"
        // Samsung labels main camera as "camera2 0, facing back"
        const sorted = [...cameras].sort((a, b) => {
          const score = (label) => {
            const l = label.toLowerCase();
            // Main camera heuristics
            if (l.includes('facing back') && l.includes(' 0,')) return -3;
            if (l.includes('back') || l.includes('rear')) return -2;
            if (l.includes('environment')) return -1;
            if (l.includes('front') || l.includes('user') || l.includes('facing front')) return 2;
            return 0;
          };
          return score(a.label) - score(b.label);
        });

        log('Sorted camera order to try:', 'info');
        sorted.forEach((c, i) => log(`  [${i}] "${c.label}"`, 'info'));

        // Try each camera until we find one with torch
        let found = null;
        for (const cam of sorted) {
          found = await tryCamera(cam.deviceId, cam.label);
          if (found) break;
          log(`  → No torch on this camera, trying next…`, 'info');
        }

        if (!found) {
          log('❌ No camera with torch support found across all devices.', 'err');
          log('This device may not support torch via the Web API.', 'err');
          setStatus('statusTorchSupport', 'red', 'No');

          // Still keep the last camera stream open for QR scanning
          const fallback = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: 'environment' } }
          });
          stream = fallback;
          videoTrack = fallback.getVideoTracks()[0];
          video.srcObject = fallback;
          placeholder.style.display = 'none';
          scanLine.style.display = 'block';
          setStatus('statusCamera', 'green', 'Active (no torch)');
          document.getElementById('btnStop').disabled = false;
          return;
        }

        stream = found.stream;
        videoTrack = found.track;
        torchSupported = true;

        placeholder.style.display = 'none';
        scanLine.style.display = 'block';

        const settings = videoTrack.getSettings();
        log(`🎥 Active camera: "${videoTrack.label}"`, 'ok');
        log(`   facing=${settings.facingMode} res=${settings.width}x${settings.height}`, 'ok');

        setStatus('statusCamera', 'green', 'Active');
        setStatus('statusTorchSupport', 'green', 'Yes ✅');

        const facing = settings.facingMode;
        document.getElementById('statusFacing').textContent =
          facing === 'environment' ? '🔙 Rear' :
          facing === 'user'        ? '🔜 Front' : facing ?? '❓';

        if (facing === 'user') {
          log('⚠️ Warning: ended up on FRONT camera — torch may not work', 'err');
        }

        log('🔦 Torch ready — use the toggle button!', 'ok');
        document.getElementById('btnTorch').disabled = false;
        document.getElementById('btnStop').disabled = false;

      } catch (err) {
        log(`startCamera error — ${err.name}: ${err.message}`, 'err');
        console.error(err);
        document.getElementById('btnStart').disabled = false;
      }
    }

    // ── Toggle torch ──────────────────────────────────────────
    async function toggleTorch() {
      if (!videoTrack || !torchSupported) return;

      torchOn = !torchOn;
      try {
        await videoTrack.applyConstraints({ advanced: [{ torch: torchOn }] });
        log(`Torch ${torchOn ? 'ON 🔦' : 'OFF'}`, torchOn ? 'ok' : '');
        console.log('[TorchTest] torch toggled ->', torchOn, '| track:', videoTrack?.label);
        setStatus('statusTorch', torchOn ? 'green' : 'grey', torchOn ? 'ON' : 'Off');

        const btn = document.getElementById('btnTorch');
        btn.classList.toggle('active', torchOn);
        btn.innerHTML = torchOn
          ? `🔦 Torch ON — tap to OFF`
          : `🔦 Toggle Torch`;
      } catch (err) {
        log(`toggleTorch error — ${err.name}: ${err.message}`, 'err');
        torchOn = !torchOn;
      }
    }

    // ── Stop camera ───────────────────────────────────────────
    function stopCamera() {
      if (stream) {
        if (torchOn && videoTrack) {
          videoTrack.applyConstraints({ advanced: [{ torch: false }] }).catch(() => {});
          torchOn = false;
        }
        stream.getTracks().forEach(t => t.stop());
        stream = null;
        videoTrack = null;
      }

      video.srcObject = null;
      placeholder.style.display = 'flex';
      scanLine.style.display = 'none';

      setStatus('statusCamera', 'grey', 'Off');
      setStatus('statusTorch', 'grey', 'Off');
      setStatus('statusTorchSupport', 'grey', 'Unknown');
      document.getElementById('statusFacing').textContent = '—';

      document.getElementById('btnStart').disabled = false;
      document.getElementById('btnStop').disabled = true;
      document.getElementById('btnTorch').disabled = true;
      document.getElementById('btnTorch').classList.remove('active');
      document.getElementById('btnTorch').innerHTML = `🔦 Toggle Torch`;

      log('Camera stopped.', '');
    }
  </script>
</body>
</html>
